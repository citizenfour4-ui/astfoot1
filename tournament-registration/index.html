<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسجيل في دوري المرحوم عبد العالي عدي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; background: #fff; margin: 30px auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a5276; font-size: 24px; margin-bottom: 5px; }
        h2 { color: #566573; font-size: 16px; margin-top: 0; margin-bottom: 30px; }
        .form-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #219653; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .share-btn { background-color: #3b5998; margin-top: 15px; }
        .share-btn:hover { background-color: #2d4373; }
        .message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>دوري المرحوم عبد العالي عدي</h1>
    <h2>المنظم من طرف الجمعية الرياضية تسلا (Association Sportive Tesla)</h2>
    
    <form id="registrationForm">
        <div class="form-group">
            <label for="fullName">الاسم الكامل:</label>
            <input type="text" id="fullName" required placeholder="أدخل اسمك الثلاثي">
        </div>
        
        <div class="form-group">
            <label for="age">العمر:</label>
            <input type="number" id="age" required min="5" max="90" placeholder="أدخل عمرك">
        </div>
        
        <button type="submit" id="submitBtn">إرسال التسجيل</button>
    </form>
    
    <div id="msg" class="message"></div>
    
    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
    
    <button class="share-btn" onclick="shareOnFacebook()">شارك الدوري على فيسبوك</button>
</div>

<script>
    const SUPABASE_URL = "https://yiunltkwjhrkbnrybtby.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_76cDS0ynvnqNag6welW0iw_rkQ4v";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('fullName').value;
        const age = parseInt(document.getElementById('age').value);
        const msgDiv = document.getElementById('msg');
        const submitBtn = document.getElementById('submitBtn');

        msgDiv.style.color = '#34495e';
        msgDiv.innerText = 'جاري إرسال البيانات...';
        submitBtn.disabled = true;

        const { data, error } = await supabase
            .from('participants')
            .insert([{ name: name, age: age }]);

        if (error) {
            msgDiv.style.color = 'red';
            msgDiv.innerText = 'حدث خطأ أثناء التسجيل، حاول مجدداً.';
            console.error(error);
        } else {
            msgDiv.style.color = 'green';
            msgDiv.innerText = 'تم تسجيلك بنجاح في الدوري!';
            document.getElementById('registrationForm').reset();
        }
        submitBtn.disabled = false;
    });

    function shareOnFacebook() {
        const currentUrl = window.location.href;
        const fbShareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`;
        window.open(fbShareUrl, '_blank', 'width=600,height=400');
    }
</script>

</body>
</html>
